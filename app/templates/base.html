<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arda Registry</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f6;
      --surface: #ffffff;
      --border: #e2e4e9;
      --text: #1a1c23;
      --text-muted: #6b7280;
      --accent: #5048e5;
      --accent-hover: #3d35cc;
      --success: #16a34a;
      --danger: #dc2626;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Nav ── */
    nav {
      background: #16161e;
      color: #cdd6f4;
      height: 54px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 32px;
      border-bottom: 1px solid #2a2a3c;
    }
    .brand {
      font-weight: 700;
      font-size: 15px;
      color: #c0a6f7;
      letter-spacing: -0.3px;
      text-decoration: none;
    }
    nav a {
      color: #a6adc8;
      text-decoration: none;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 6px;
      transition: background .15s, color .15s;
    }
    nav a:hover { background: #1e1e2e; color: #cdd6f4; }
    nav a.nav-active { background: #1e1e2e; color: #cdd6f4; font-weight: 600; }
    nav .nav-right { margin-left: auto; }

    /* ── Layout ── */
    main {
      max-width: 1120px;
      margin: 32px auto;
      padding: 0 24px;
    }

    /* ── Typography ── */
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 12px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: background .15s, color .15s;
      line-height: 1.4;
    }
    .btn-primary   { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); }
    .btn-danger-sm {
      background: transparent;
      color: #b91c1c;
      border: 1px solid #fecaca;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-danger-sm:hover { background: #fef2f2; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .card-body { padding: 20px; }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    /* ── Alert ── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-size: 13px;
    }
    .alert-danger { background: #fef2f2; border: 1px solid #fecaca; color: var(--danger); }
    .alert-danger ul { padding-left: 18px; margin-top: 6px; }

    /* ── Table ── */
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    td {
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafbfc; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-green  { background: #dcfce7; color: #166534; }
    .badge-gray   { background: #f3f4f6; color: #374151; }
    .badge-blue   { background: #dbeafe; color: #1d4ed8; }
    .badge-purple { background: #f3e8ff; color: #6b21a8; }
    .badge-yellow { background: #fef9c3; color: #854d0e; }

    .tags { display: flex; gap: 4px; flex-wrap: wrap; }

    /* ── Form sections ── */
    .form-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 14px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; }
    .mt-3  { margin-top: 16px; }

    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .hint { font-size: 11px; color: var(--text-muted); }

    input[type="text"],
    input[type="number"],
    select,
    textarea {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      color: var(--text);
      background: var(--surface);
      width: 100%;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(80, 72, 229, .1);
    }
    textarea { resize: vertical; min-height: 88px; }

    .checkboxes { display: flex; gap: 20px; flex-wrap: wrap; }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
      cursor: pointer;
      user-select: none;
      text-transform: none;
      letter-spacing: 0;
    }
    .checkbox-row input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    /* ── Collapsible optional sections ── */
    details > summary {
      cursor: pointer;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
    }
    details > summary::before {
      content: "›";
      font-size: 17px;
      line-height: 1;
      transition: transform .18s;
      display: inline-block;
    }
    details[open] > summary::before { transform: rotate(90deg); }
    details[open] > summary {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    /* ── Form actions ── */
    .form-actions { display: flex; gap: 10px; align-items: center; margin-top: 24px; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 72px 24px;
      color: var(--text-muted);
    }
    .empty-state p { margin-bottom: 18px; font-size: 15px; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">⬡ Arda Registry</a>
    <a href="/" {% if request.url.path == '/' %}class="nav-active"{% endif %}>Services</a>
    <a href="/ops" {% if request.url.path == '/ops' %}class="nav-active"{% endif %}>Operations</a>
    <a href="/config" {% if request.url.path == '/config' %}class="nav-active"{% endif %}>Config</a>
    <a href="/logs" {% if request.url.path == '/logs' %}class="nav-active"{% endif %}>Logs</a>
    <span class="nav-right">
      <a href="/services/new" class="btn btn-primary" style="font-size:13px;">+ Add Service</a>
    </span>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer style="text-align:center; padding:18px; font-size:11px; color:#9ca3af;">
    arda-registry v{{ app_version }}
  </footer>
</body>
</html>

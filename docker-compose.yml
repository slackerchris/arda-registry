services:
  arda-registry:
    image: ghcr.io/slackerchris/arda-registry:0.1.18
    container_name: arda-registry
    restart: unless-stopped
    env_file:
      - stack.env
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - /mnt/downloads:/mnt/downloads
      # Enable this too if using mafl.deploy.mode=direct on the Mafl host.
      # - /docker/mafl:/docker/mafl
      # Optional: enable only if you want Arda's Restart Mafl button.
      # - /var/run/docker.sock:/var/run/docker.sock

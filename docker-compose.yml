services:
  arda-registry:
    image: ghcr.io/slackerchris/arda-registry:0.1.3
    container_name: arda-registry
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - /mnt/nas-downloads/mafl:/mnt/nas-downloads/mafl
